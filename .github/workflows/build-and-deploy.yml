name: Build LaTeX & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: report.tex
          # Runs pdflatex twice automatically to resolve references

      - name: Prepare deployment folder
        run: |
          mkdir -p _site
          cp report.pdf _site/report.pdf
          cp index.html _site/index.html
          cp apsit_logo.jpg _site/apsit_logo.jpg 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
